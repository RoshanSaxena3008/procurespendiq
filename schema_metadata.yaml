  - name: invoice_aging
    question: "Show overdue invoices by aging buckets"
    sql: |
      WITH __fact_invoices AS (
      SELECT
        INVOICE_STATUS,
        POSTING_DATE,
        INVOICE_AMOUNT_LOCAL AS invoice_amount,
        AGING_DAYS
       FROM ProcureSpendIQ.INFORMATION_MART.fact_all_sources_vw
          ),
        AgingBuckets AS (
       SELECT
        CASE
            WHEN fi.AGING_DAYS <= 30 THEN '0-30 days'
            WHEN fi.AGING_DAYS <= 60 THEN '31-60 days'
            WHEN fi.AGING_DAYS <= 90 THEN '61-90 days'
            ELSE '90+ days'
        END AS aging_bucket,
        CASE
            WHEN fi.AGING_DAYS <= 30 THEN 1
            WHEN fi.AGING_DAYS <= 60 THEN 2
            WHEN fi.AGING_DAYS <= 90 THEN 3
            ELSE 4
        END AS sort_order,
        fi.invoice_amount,
        fi.POSTING_DATE
       FROM __fact_invoices AS fi
       WHERE fi.INVOICE_STATUS = 'Overdue' 
      AND fi.AGING_DAYS > 0
       )
      SELECT
      aging_bucket,
      COUNT(*) AS invoice_count,
      SUM(invoice_amount) AS total_amount,
      MIN(POSTING_DATE) AS start_date,
      MAX(POSTING_DATE) AS end_date
        FROM AgingBuckets
      GROUP BY aging_bucket, sort_order
      ORDER BY sort_order;
